<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plus One — Orchestrator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #FFF9F5;
    --surface: #FFFFFF;
    --surface-light: #FFF0E8;
    --text: #2D1810;
    --text-secondary: #9B7B6B;
    --primary: #E8593A;
    --primary-dark: #D4572A;
    --accent: #D4A574;
    --border: #F0DDD0;
    --success: #2D8B4E;
    --warning: #C4850C;
    --error: #D4382C;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
    max-width: 900px;
    margin: 0 auto;
  }

  header { margin-bottom: 24px; }
  .header-row {
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(135deg, #E8593A 0%, #FF6B35 50%, #FFB347 100%);
    color: white; padding: 20px 24px; border-radius: 16px;
    box-shadow: 0 4px 20px rgba(232,89,58,0.2);
  }
  h1 { font-size: 24px; font-weight: 800; }
  .subtitle { color: rgba(255,255,255,0.85); font-size: 13px; margin-top: 2px; }
  .last-updated { font-size: 11px; opacity: 0.8; }

  .status-card {
    background: var(--surface); border-radius: 12px; padding: 16px 20px;
    margin: 16px 0; border: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
    box-shadow: 0 2px 8px rgba(139,101,80,0.05);
  }
  .status-icon {
    width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
    background: var(--success); animation: pulse 2s infinite;
  }
  .status-icon.working { background: var(--warning); }
  .status-icon.blocked { background: var(--error); }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .status-text { flex: 1; }
  .status-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; }
  .status-current { font-size: 15px; font-weight: 600; margin-top: 2px; }
  .status-blocked { font-size: 13px; color: var(--error); margin-top: 4px; }

  .section {
    background: var(--surface); border-radius: 16px; padding: 20px;
    margin-bottom: 20px; border: 1px solid var(--border);
    box-shadow: 0 2px 8px rgba(139,101,80,0.05);
  }
  .section-title {
    font-size: 14px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--primary-dark);
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }
  .section-title .count {
    background: var(--surface-light); color: var(--primary-dark);
    padding: 2px 8px; border-radius: 10px; font-size: 11px;
  }

  .todo {
    background: var(--surface-light); border-radius: 12px; padding: 14px;
    margin-bottom: 10px; border: 1px solid var(--border);
    display: flex; align-items: flex-start; gap: 12px;
    transition: opacity 0.2s;
  }
  .todo.checked { opacity: 0.5; }
  .todo.checked .todo-title { text-decoration: line-through; }
  .todo-checkbox {
    width: 22px; height: 22px; border-radius: 6px;
    border: 2px solid var(--accent); background: white;
    cursor: pointer; flex-shrink: 0; margin-top: 2px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 800; color: white;
    transition: all 0.15s;
  }
  .todo-checkbox:hover { border-color: var(--primary); }
  .todo-checkbox.checked { background: var(--success); border-color: var(--success); }
  .todo-content { flex: 1; min-width: 0; }
  .todo-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .todo-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.4; }
  .todo-priority {
    display: inline-block; padding: 2px 8px; border-radius: 8px;
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    margin-left: 8px;
  }
  .priority-high { background: rgba(212,56,44,0.15); color: var(--error); }
  .priority-medium { background: rgba(196,133,12,0.15); color: var(--warning); }
  .priority-low { background: rgba(155,123,107,0.15); color: var(--text-secondary); }
  .todo-actions {
    display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap;
  }
  .btn {
    padding: 6px 12px; border-radius: 8px; border: none;
    background: var(--surface); color: var(--primary-dark);
    font-size: 12px; font-weight: 600; cursor: pointer;
    border: 1px solid var(--border); transition: all 0.15s;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .btn:hover { background: var(--primary); color: white; border-color: var(--primary); }
  .btn-primary { background: var(--primary); color: white; border-color: var(--primary); }
  .btn-primary:hover { background: var(--primary-dark); border-color: var(--primary-dark); }

  .question {
    background: white; border-left: 3px solid var(--accent);
    padding: 12px 14px; border-radius: 8px; margin-bottom: 10px;
  }
  .question-text { font-size: 14px; font-weight: 600; }
  .question-context { font-size: 12px; color: var(--text-secondary); margin-top: 4px; line-height: 1.4; }

  .completed-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0; border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .completed-item:last-child { border-bottom: none; }
  .completed-when { color: var(--text-secondary); font-size: 11px; }

  .note {
    background: var(--surface-light); padding: 8px 12px;
    border-radius: 8px; margin-bottom: 6px; font-size: 12px;
    font-family: 'SF Mono', Consolas, monospace;
    color: var(--text-secondary);
  }

  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--success); color: white; padding: 12px 20px;
    border-radius: 12px; font-size: 14px; font-weight: 600;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    transform: translateY(100px); opacity: 0;
    transition: all 0.3s;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  .empty {
    text-align: center; color: var(--text-secondary);
    padding: 24px; font-size: 13px; font-style: italic;
  }
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div>
      <h1>Plus One Orchestrator</h1>
      <div class="subtitle">Live task & status board</div>
    </div>
    <div class="last-updated" id="lastUpdated">—</div>
  </div>
</header>

<div class="status-card">
  <div class="status-icon" id="statusIcon"></div>
  <div class="status-text">
    <div class="status-label">Claude Status</div>
    <div class="status-current" id="statusCurrent">Loading...</div>
    <div class="status-blocked" id="statusBlocked"></div>
  </div>
</div>

<div class="section">
  <div class="section-title">
    Human To-Do
    <span class="count" id="todoCount">0</span>
  </div>
  <div id="todoList"></div>
</div>

<div class="section">
  <div class="section-title">Open Questions for You</div>
  <div id="questionsList"></div>
</div>

<div class="section">
  <div class="section-title">Recently Completed</div>
  <div id="completedList"></div>
</div>

<div class="section">
  <div class="section-title">Critical Notes</div>
  <div id="notesList"></div>
</div>

<div class="toast" id="toast"></div>

<script>
let state = null;

async function loadState() {
  try {
    const res = await fetch('/dashboard/state.json?t=' + Date.now());
    state = await res.json();
    render();
  } catch (e) {
    console.error('Failed to load state:', e);
  }
}

function render() {
  if (!state) return;

  // Last updated
  const updated = new Date(state.lastUpdated);
  document.getElementById('lastUpdated').textContent =
    'Updated ' + updated.toLocaleTimeString([], {hour: 'numeric', minute: '2-digit'});

  // Status
  const icon = document.getElementById('statusIcon');
  icon.className = 'status-icon ' + (state.claudeStatus.icon || 'ready');
  document.getElementById('statusCurrent').textContent = state.claudeStatus.current;
  const blocked = document.getElementById('statusBlocked');
  blocked.textContent = state.claudeStatus.blockedOn ? 'BLOCKED: ' + state.claudeStatus.blockedOn : '';

  // Todos
  const todos = state.humanTodos || [];
  const checkedCount = todos.filter(t => t.checked).length;
  document.getElementById('todoCount').textContent = (todos.length - checkedCount) + ' open';

  document.getElementById('todoList').innerHTML = todos.length === 0
    ? '<div class="empty">No tasks for you right now.</div>'
    : todos.map(t => `
      <div class="todo ${t.checked ? 'checked' : ''}" data-id="${t.id}">
        <div class="todo-checkbox ${t.checked ? 'checked' : ''}" onclick="toggleTodo('${t.id}')">${t.checked ? '✓' : ''}</div>
        <div class="todo-content">
          <div class="todo-title">${t.title}<span class="todo-priority priority-${t.priority || 'low'}">${t.priority || 'low'}</span></div>
          <div class="todo-desc">${t.description || ''}</div>
          <div class="todo-actions">
            ${t.url ? `<a class="btn btn-primary" href="${t.url}" target="_blank">Open Link →</a>` : ''}
            ${t.prompt ? `<button class="btn" onclick="copyPrompt('${t.id}')">Copy Prompt</button>` : ''}
            <button class="btn" onclick="simplify('${t.id}')">Simplify Instructions</button>
          </div>
        </div>
      </div>`).join('');

  // Questions
  const questions = state.openQuestions || [];
  document.getElementById('questionsList').innerHTML = questions.length === 0
    ? '<div class="empty">No open questions.</div>'
    : questions.map(q => `
      <div class="question">
        <div class="question-text">${q.question}</div>
        <div class="question-context">${q.context || ''}</div>
      </div>`).join('');

  // Completed
  const completed = state.recentlyCompleted || [];
  document.getElementById('completedList').innerHTML = completed.length === 0
    ? '<div class="empty">Nothing completed yet.</div>'
    : completed.slice(0, 10).map(c => `
      <div class="completed-item">
        <div>✓ ${c.title}</div>
        <div class="completed-when">${c.when}</div>
      </div>`).join('');

  // Notes
  const notes = state.criticalNotes || [];
  document.getElementById('notesList').innerHTML = notes.map(n =>
    `<div class="note">${n}</div>`).join('');
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

async function toggleTodo(id) {
  // Toggle locally; user can ask Claude to persist
  const t = state.humanTodos.find(x => x.id === id);
  if (!t) return;
  t.checked = !t.checked;
  // Persist to localStorage as a quick check
  const overrides = JSON.parse(localStorage.getItem('todoOverrides') || '{}');
  overrides[id] = t.checked;
  localStorage.setItem('todoOverrides', JSON.stringify(overrides));
  render();
  toast(t.checked ? 'Marked done' : 'Marked open');
}

function copyPrompt(id) {
  const t = state.humanTodos.find(x => x.id === id);
  if (!t || !t.prompt) return;
  navigator.clipboard.writeText(t.prompt);
  toast('Prompt copied to clipboard');
}

function simplify(id) {
  const t = state.humanTodos.find(x => x.id === id);
  if (!t) return;
  const msg = `Please simplify the instructions for: "${t.title}". Break it down into smaller, easier steps.`;
  navigator.clipboard.writeText(msg);
  toast('Simplify request copied — paste into Claude');
}

// Apply localStorage overrides to checked state on load
function applyOverrides() {
  if (!state) return;
  const overrides = JSON.parse(localStorage.getItem('todoOverrides') || '{}');
  state.humanTodos.forEach(t => {
    if (overrides[t.id] !== undefined) t.checked = overrides[t.id];
  });
}

// Poll every 5 seconds
loadState().then(applyOverrides).then(render);
setInterval(() => loadState().then(applyOverrides).then(render), 5000);
</script>

</body>
</html>
